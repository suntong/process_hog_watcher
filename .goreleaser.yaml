version: 2

# 1. Define the project name globally. 
# {{ .ProjectName }} will now dynamically resolve to "phw" everywhere below.
project_name: phw

before:
  hooks:
    - go mod tidy

builds:
  - #id: phw
    # `id` & `binary` defaults to the `project_name` automatically, so you don't 
    # even need to explicitly define then here.
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    # Strips debug information to keep binaries small
    ldflags:
      - -s -w

nfpms:
  - id: phw
    # 3. Using variables for the Linux packaging
    package_name: "{{ .ProjectName }}"
    file_name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}{{ if .Arm }}v{{ .Arm }}{{ end }}"
    homepage: https://github.com/suntong/process_hog_watcher
    maintainer: suntong
    description: Process Hog Watcher
    license: MIT
    formats:
      - apk
      - deb
      - rpm

archives:
  - formats:
      - tar.gz
    # 2. Reverted back to using variables
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats:
          - zip

snapshot:
  version_template: "{{ incpatch .Version }}-snapshot"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
